name: Android CI

on:
  push:
    branches: ["main", "develop", "feat/**"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate learning content
        run: python scripts/validate_content.py

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Lint
        shell: bash
        run: |
          set -o pipefail
          gradle --no-daemon lintDebug 2>&1 | tee lint-debug.log

      - name: Unit tests
        run: gradle --no-daemon testDebugUnitTest

      - name: Build debug APK
        run: gradle --no-daemon assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: sumber-ilmu-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload lint diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-diagnostics
          path: |
            lint-debug.log
            app/build/reports/lint-results-debug.html
          if-no-files-found: warn
          retention-days: 14
